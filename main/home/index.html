<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dior & I - Home</title>
    <!-- CSS for the generic navbar will be loaded by the component itself -->
    <link rel="stylesheet" href="home.css">

    <!-- Load Navbar Component -->
    <script src="../components/navbar/navbar.js" defer></script>
    <script src="home.js" defer></script>
</head>

<body>
    <div id="app">
        <dior-navbar active="home"></dior-navbar>

        <main class="dashboard-main">
            <!-- Hero Carousel -->
            <section class="hero-section">
                <div class="hero-carousel">
                    <div class="hero-slide active">
                        <div class="hero-image-container">
                            <img src="https://picsum.photos/800/600?random=1" alt="Hero Placeholder"
                                class="hero-bg-image" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div class="hero-content">
                            <h1 class="hero-title">LOREM IPSUM DIOR</h1>
                            <p class="hero-description">
                                Discover architecto beatae vitae dicta sunt explicabo voluptatem quia...
                            </p>

                            <a href="#" class="hero-link">
                                <div class="icon-circle">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                                <span class="hero-link-text">Open the news</span>
                            </a>

                            <div class="hero-meta">
                                <div class="hero-dots">
                                    <span class="dot active"></span>
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                </div>
                                <div class="hero-time">
                                    <span>3 min</span>
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <button class="nav-arrow prev">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="more-news-container">
                    <button class="btn more-news-btn">More news</button>
                </div>
            </section>

            <!-- Pending Learnings -->
            <section class="carousel-section">
                <div class="section-header">
                    <h2 class="section-title">PENDING LEARNINGS</h2>
                    <button class="collapse-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="18 15 12 9 6 15"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="cards-carousel">
                    <div class="cards-container">
                        <!-- Card 1 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=2" alt="Drawing Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <div class="card-progress-bar">
                                <div class="card-progress-fill" style="width: 70%;"></div>
                            </div>
                            <h3 class="card-title">Disabilities at Parfums Christian Dior</h3>
                            <div class="card-info">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg>
                            </div>
                        </div>

                        <!-- Card 2 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=3" alt="Mansion Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <div class="card-progress-bar">
                                <div class="card-progress-fill" style="width: 30%;"></div>
                            </div>
                            <h3 class="card-title">Welcome at Parfums Christian Dior</h3>
                            <div class="card-info">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg>
                            </div>
                        </div>

                        <!-- Card 3 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=4" alt="Pink Flowers Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <div class="card-progress-bar">
                                <div class="card-progress-fill" style="width: 15%;"></div>
                            </div>
                            <h3 class="card-title">All about Parfums Christian Dior</h3>
                            <div class="card-info">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="16" x2="12" y2="12"></line>
                                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <button class="nav-arrow next side-arrow">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- My Mandatory -->
            <section class="carousel-section" style="margin-top: 2rem;">
                <div class="section-header">
                    <h2 class="section-title">MY MANDATORY</h2>
                    <button class="collapse-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="18 15 12 9 6 15"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="cards-carousel">
                    <div class="cards-container">
                        <!-- Card 1 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=5" alt="Lips Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                        </div>

                        <!-- Card 2 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=6" alt="Office Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                        </div>

                        <!-- Card 3 -->
                        <div class="card">
                            <div class="card-image-wrapper">
                                <img src="https://picsum.photos/400/300?random=7" alt="Nature Image"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                        </div>
                    </div>

                    <button class="nav-arrow next side-arrow">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
