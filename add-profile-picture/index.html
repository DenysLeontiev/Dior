<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dior &amp; I - Add Profile Picture</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="profile-wrapper">
        <header class="profile-header">
            <img src="../Images/dior.png" alt="Dior &amp; I" class="logo">
        </header>

        <main class="profile-main">
            <h1 class="welcome-title">Welcome!</h1>
            <p class="subtitle">Do you want to add or edit your profile picture?</p>

            <div class="avatar-container" id="avatar-container" role="button" aria-label="Upload profile picture"
                tabindex="0">
                <div class="avatar-placeholder" id="avatar-placeholder">
                    <img src="../Images/user-silhouette.svg" alt="" class="avatar-icon" aria-hidden="true">
                </div>
                <input type="file" id="file-upload" accept="image/*" hidden>
            </div>

            <div class="action-container">
                <button class="btn select-btn" id="select-btn">Select a picture</button>
                <button class="btn later-btn" id="later-btn">Later</button>
            </div>
        </main>
    </div>
</body>

</html>
